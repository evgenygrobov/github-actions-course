name: 01 Building Block

on:
    push:
    workflow_dispatch:

jobs:
    echo-hello:
        runs-on: ubuntu-latest
        steps:
            - name: Say Hello
              run: echo "Hello World"
    echo-goodbye:
        runs-on: ubuntu-latest
        steps:
            - name: Failed Step
              run: |
                echo "This step will fail"
                exit 0
            - name: Say Goodbye
              run: echo "Goodbye World"